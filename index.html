<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>まちピカランナー：Plogging Quest</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0e1320;
        color: #f6f7fb;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI',
          'Meiryo', sans-serif;
        overflow: hidden;
        height: 100%;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
      }
      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-container canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
